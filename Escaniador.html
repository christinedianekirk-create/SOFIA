<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Escaneador - SOFÍA</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .preview {
      margin-top: 20px;
      max-width: 90%;
      border: 2px solid #ccc;
      padding: 10px;
      border-radius: 10px;
    }
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #008CBA;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:hover {
      background: #006f94;
    }
  </style>
</head>

<body>
  <header>
    <h1>Escaneador</h1>
    <h3>Sube documentos, fotos o recetas</h3>
  </header>

  <main>
    <section>
      <h2>Selecciona una imagen</h2>
      <input type="file" id="fileInput" accept="image/*">
      <button class="btn" onclick="clearImage()">Limpiar</button>

      <div id="previewContainer"></div>
    </section>

    <a href="index.html" class="back-button">⬅ Regresar al menú</a>
  </main>

  <footer>
    <p>SOFÍA - Sistema Familiar</p>
  </footer>

  <script>
    const fileInput = document.getElementById("fileInput");
    const previewContainer = document.getElementById("previewContainer");

    fileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewContainer.innerHTML = 
            `<img src="${e.target.result}" class="preview">`;
        };
        reader.readAsDataURL(file);
      }
    });

    function clearImage() {
      fileInput.value = "";
      previewContainer.innerHTML = "";
    }
  </script>

</body>
</html>
